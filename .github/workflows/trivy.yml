name: Reusable Trivy Scan

on:
  workflow_call:
    inputs:
      scan_type:
        required: true
        type: string
      scanners:
        required: true
        type: string
      skip_dirs:
        required: false
        type: string
        default: ""
      skip_files:
        required: false
        type: string
        default: ""

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: ${{ inputs.scan_type }}
          scan-ref: .
          scanners: ${{ inputs.scanners }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-dirs: ${{ inputs.skip_dirs }}
          skip-files: ${{ inputs.skip_files }}
